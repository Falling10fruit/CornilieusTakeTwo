<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cornileius</title>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
            }
        </style>

        <link rel="stylesheet" href="canvas.css">
        <link rel="stylesheet" href="error_box.css">
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <h1>Hello World!</h1>

        <div id="error_box" style="visibility: hidden;">
            <h2>huh.</h2>
            <p>idk, shit happens</p>
            <button>well fuck</button> <button>copy error</button>
        </div>

        <script>
            const eyedropper = document.createElement("input");
            eyedropper.type = "color";

            window.world = {
                width: 1600,
                height: 900,
                seed: 43758.5453,
                textureBuffer: null,
            };

            window.camera = {
                x: 0,
                y: 0,
                zoom: 1,
                rotation: (0)*Math.PI/180,
            };

            window.keyIsDown = {};

            window.onkeyup = (e) => { window.keyIsDown[e.key] = false; }
            window.onkeydown = (event) => {
                window.keyIsDown[event.key] = true;
                console.log(event.key);

                if (event.key === "F5") eyedropper.click();
            };
        </script>

        <script type="module" src="webgl2Boilerplate.js"></script>
        <script type="module" src="generateWorldShader.js"></script>
        <script type="module" src="renderWorld.js"></script>
        <script type="module" src="render.js"></script>
        <script defer type="module" src="setUpGPU.js"></script>
        <!--<script src="https://greggman.github.io/webgl-lint/webgl-lint.js" crossorigin></script><!--Ignore red it's fine-->
    </body>
</html>
