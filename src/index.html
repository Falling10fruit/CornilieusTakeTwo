<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cornileius</title>

        <style>
            body {
                box-sizing: border-box;
                margin: 0;
            }
        </style>

        <link rel="stylesheet" href="canvas.css">
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <h1>Hello World!</h1>

        <script>
            const eyedropper = document.createElement("input");
            eyedropper.type = "color";

            window.world = {
                width: 1600,
                height: 900,
                seed: 43758.5453,
                data: []
            };

            window.camera = {
                x: 0,
                y: 0,
                zoom: 1,
                rotation: (0)*Math.PI/180,
            };

            window.keyIsDown = {};
        
            window.setKeyIsDown = (event) => {
                if (event.type === "keydown") {
                    window.keyIsDown[event.key] = true;
                } else if (event.type === "keyup") {
                    window.keyIsDown[event.key] = false;
                }

                if (event.key === "f5") {
                    eyedropper.click();
                }
            };
        </script>

        <script type="module" src="webgl2Boilerplate.js"></script>
        <script type="module" src="generateWorldShader.js"></script>
        <script type="module" src="renderWorld.js"></script>
        <!--<script src="https://greggman.github.io/webgl-lint/webgl-lint.js" crossorigin></script><!--Ignore red it's fine-->
    </body>
</html>
